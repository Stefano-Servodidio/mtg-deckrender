[dev]
  command = "npm run dev"

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Force Next.js detection
[context.production]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"

# Enable Netlify Blobs
[context.production.environment]
  NETLIFY_BLOBS_CONTEXT = "production"

[context.deploy-preview.environment]
  NETLIFY_BLOBS_CONTEXT = "deploy-preview"

# Redirect traffic to primary domain
[[redirects]]
  from = "https://mtg-deck-to-png.netlify.app/*"
  to = "https://mtgdeckrender.com/:splat"
  status = 301
  force = true