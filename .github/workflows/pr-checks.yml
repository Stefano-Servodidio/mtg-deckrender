name: PR Branch Check

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-target-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR targets develop branch
        if: github.event.pull_request.base.ref != 'develop' && github.event.pull_request.base.ref != 'main'
        run: |
          echo "❌ Pull request must target 'develop' branch for features or 'main' for hotfixes"
          echo "Current target: ${{ github.event.pull_request.base.ref }}"
          echo "Please change the target branch to 'develop'"
          exit 1
      
      - name: Warn if targeting main
        if: github.event.pull_request.base.ref == 'main'
        run: |
          echo "⚠️  Warning: This PR targets 'main' branch"
          echo "Make sure this is a critical hotfix and not a regular feature"
          echo "Regular features should target 'develop' branch"
      
      - name: Success message
        if: github.event.pull_request.base.ref == 'develop'
        run: |
          echo "✅ PR correctly targets 'develop' branch"

  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linting
        run: npm run lint
      
      - name: Build application
        run: npm run build